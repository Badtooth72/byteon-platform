{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card glass-card text-center">
      <div class="card-body py-5">
        <div class="display-4 fw-bold mb-3">{{ code }}</div>
        <p class="lead mb-4">{{ message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">Back to flashcards</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
