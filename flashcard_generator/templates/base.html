<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ByteOn Flashcards{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='flashcards.css') }}" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body class="flashcards-body">
  <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary-subtle sticky-top flashcards-nav">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">🗂 ByteOn Flashcards</a>
      <div class="d-flex gap-2 align-items-center">
        <span class="badge text-bg-dark border border-secondary">User: {{ current_user }}</span>
        <a class="btn btn-outline-light btn-sm" href="/dashboard">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
