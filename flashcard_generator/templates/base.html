<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ title or "Flashcard Generator" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='flashcards.css') }}" rel="stylesheet">
</head>
<body class="byteon-body">
  <nav class="navbar navbar-expand-lg navbar-dark byteon-nav border-bottom border-secondary-subtle">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold" href="{{ prefix }}/">📚 Flashcard Generator</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topnav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="topnav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{{ prefix }}/editor">New Set</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ prefix }}/my-sets">My Sets</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ prefix }}/shared-library">Shared Library</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2 text-light small">
          <span class="badge text-bg-secondary">{{ user.display_name }}</span>
          <a class="btn btn-outline-light btn-sm" href="/dashboard">Dashboard</a>
          <a class="btn btn-outline-warning btn-sm" href="/logout">Logout</a>
        </div>
      </div>
    </div>
  </nav>
  <main class="container-fluid py-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
