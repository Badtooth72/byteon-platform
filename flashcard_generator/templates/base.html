<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ByteOn Flashcards{% endblock %}</title>

  <script>
    (function () {
      const savedTheme = localStorage.getItem("byteon-theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='flashcards.css') }}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body class="flashcards-body" data-theme="dark">
  <nav class="navbar navbar-expand-lg border-bottom sticky-top flashcards-nav">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">🗂 ByteOn Flashcards</a>
      <div class="d-flex gap-2 align-items-center">
        <span class="badge text-bg-dark border border-secondary">User: {{ current_user|default('guest', true) }}</span>
        <button id="global-theme-toggle" class="btn btn-outline-light btn-sm" type="button">Light / Dark</button>
        <a class="btn btn-outline-light btn-sm" href="/dashboard">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      const root = document.documentElement;
      const body = document.body;
      function applyTheme(theme) {
        root.setAttribute("data-theme", theme);
        body.setAttribute("data-theme", theme);
        localStorage.setItem("byteon-theme", theme);
      }
      applyTheme(localStorage.getItem("byteon-theme") || "dark");
      document.addEventListener("DOMContentLoaded", function () {
        const toggle = document.getElementById("global-theme-toggle");
        if (!toggle) return;
        toggle.addEventListener("click", function () {
          const current = root.getAttribute("data-theme") || "dark";
          const next = current === "dark" ? "light" : "dark";
          applyTheme(next);
        });
      });
    })();
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
