

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
  <h2>User Management Dashboard</h2>
  <table class="table table-bordered mt-4">
    <thead class="table-light">
      <tr>
        <th>Username</th>
        <th>Display Name</th>
        <th>Role</th>
        <th>Logins</th>
        <th>Last Login</th>
        <th>Coding Score</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.display_name }}</td>
        <td>{{ u.role }}</td>
        <td>{{ u.login_count }}</td>
        <td>{{ u.last_login }}</td>
        <td>{{ u.coding_score }}</td>
        <td>
          <a class="btn btn-sm btn-info" href="/user/{{ u.username }}">View</a>
          {% if current_user.role == 'admin' %}
          <form action="/report/delete_user" method="POST" style="display:inline-block;">
            <input type="hidden" name="username" value="{{ u.username }}">
            <button class="btn btn-sm btn-danger" onclick="return confirm('Delete {{ u.username }}?')">Delete</button>
          </form>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
