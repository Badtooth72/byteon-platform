<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logic Gate Quiz - Level 3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h2>🟠 Level 3: Match the Gate Shape</h2>
    <p>Use the truth table to decide which gate completes the circuit. Drag the image into the box, then submit.</p>

    <div id="level3-question-area">
      <div class="row">
        <div class="col-md-6">
          <table class="table table-dark table-bordered" id="level3-table"></table>
        </div>
        <div class="col-md-6 d-flex align-items-center justify-content-center">
          <div id="level3-diagram" class="d-flex align-items-center gap-2"></div>
        </div>
      </div>

      <div class="mt-4">
        <img src="images/and.svg" class="gate-img" id="img-AND" draggable="true" />
        <img src="images/or.svg" class="gate-img" id="img-OR" draggable="true" />
        <img src="images/not.svg" class="gate-img" id="img-NOT" draggable="true" />
      </div>

      <button onclick="submitLevel3()" class="btn btn-danger mt-3">Submit Answer</button>
      <button onclick="nextLevel3Question()" class="btn btn-secondary mt-3 ms-2" id="level3-next" style="display:none;">Next Question</button>
    </div>

    <div id="level3-finished" class="text-center mt-5" style="display:none;">
      <h4>🎉 You have completed all Level 3 questions!</h4>
      <p>Your final score: <span id="level3-final-score"></span></p>
      <a href="index.html" class="btn btn-primary mt-3">⬅ Back to Quiz Home</a>
    </div>
  </div>

  <script src="quiz.js"></script>
  <script>startLevel3();</script>
</body>
</html>
