<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logic Gate Quiz - Level 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h2>🟡 Level 2: Label the Logic Circuit</h2>
    <p>Answer each question by dragging the correct label onto the logic diagram. Click "Next Question" to continue.</p>

    <div id="level2-question-area">
      <div class="row">
        <div class="col-md-6">
          <table class="table table-dark table-bordered" id="truth-table"></table>
        </div>
        <div class="col-md-6 d-flex align-items-center justify-content-center">
          <div id="diagram-label" class="d-flex align-items-center"></div>
        </div>
      </div>

      <!-- Symbol bank -->
      <div class="mt-4">
        <div class="symbol label" draggable="true" id="label-AND">AND</div>
        <div class="symbol label" draggable="true" id="label-OR">OR</div>
        <div class="symbol label" draggable="true" id="label-NOT">NOT</div>
      </div>

      <button onclick="submitLevel2()" class="btn btn-warning mt-3">Submit Answer</button>
      <button onclick="nextLevel2Question()" class="btn btn-secondary mt-3 ms-2" id="next-button" style="display:none;">Next Question</button>
    </div>

    <div id="level2-finished" class="text-center mt-5" style="display:none;">
      <h4>🎉 You have completed all questions!</h4>
      <p>Your final score: <span id="level2-final-score"></span></p>
      <a href="index.html" class="btn btn-primary mt-3">⬅ Back to Quiz Home</a>
    </div>
  </div>

  <script src="quiz.js"></script>
  <script>startLevel2();</script>
</body>
</html>
