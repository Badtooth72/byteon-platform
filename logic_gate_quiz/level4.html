<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logic Gate Quiz - Level 4</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260107c">
</head>
<body>
  <div class="container">
    <div class="d-flex align-items-center justify-content-between mt-4 flex-wrap gap-2">
      <h2 class="m-0">🔴 Level 4: Build Compound Logic Circuits</h2>
      <a href="index.html" class="btn btn-outline-light">← Quiz Home</a>
    </div>

    <p class="lead mt-2">Drag the correct gate images onto the circuit. Attempt all questions, then review your answers at the end.</p>

    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mt-2">
      <div class="text-secondary fw-bold" id="level4-progress">Question 1 / 8</div>
    </div>

    <div id="level4-question-area">
      <table class="table table-dark" id="level4-table"></table>

      <div id="level4-diagram"></div>

      <div class="mt-4">
        <div class="mb-2 text-secondary fw-bold">Gate palette</div>
        <div class="d-flex gap-3 align-items-center flex-wrap">
          <img src="images/and.svg" class="gate-img" id="img-AND" draggable="true" alt="AND gate" />
          <img src="images/or.svg" class="gate-img" id="img-OR" draggable="true" alt="OR gate" />
          <img src="images/not.svg" class="gate-img" id="img-NOT" draggable="true" alt="NOT gate" />
        </div>
      </div>

      <button onclick="submitLevel4()" class="btn btn-primary mt-3">Submit & Next</button>
    </div>

    <div id="level4-finished" style="display:none;" class="results-panel">
      <div class="results-header">
        <div>
          <h4 class="m-0">✅ Level 4 Results</h4>
          <div class="text-secondary">Review what you placed vs the correct gates.</div>
        </div>
        <a href="index.html" class="btn btn-outline-light">← Back to Quiz Home</a>
      </div>

      <div class="mt-3">
        <div class="display-6 fw-bold" id="level4-final-score"></div>
      </div>

      <div class="results-list" id="level4-results-list"></div>
    </div>
  </div>

  <script src="quiz.js?v=20260107c"></script>
  <script>startLevel4();</script>
</body>
</html>
