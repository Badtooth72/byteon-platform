# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name byteon.richardlander.cornwall.sch.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS Server Block
server {
    listen 443 ssl;
    server_name byteon.richardlander.cornwall.sch.uk;

    ssl_certificate     /etc/letsencrypt/live/byteon.richardlander.cornwall.sch.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/byteon.richardlander.cornwall.sch.uk/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 🔐 Auth-specific routes (login, dashboard, logout)
    location ~ ^/(login|dashboard|logout)$ {
        proxy_pass http://auth:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 🔁 Route /auth/* to the auth container
    location /auth/ {
        proxy_pass http://auth:5002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

        # 🔁 Forward API calls to auth container
    location /api/ {
        proxy_pass http://auth:5002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # 🏠 Root route (homepage) goes to auth container
    location = / {
        proxy_pass http://auth:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 🎮 Conversion Quiz Game
    location /conversion-game/ {
        proxy_pass http://conversion_game:5003/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }


    location = /coding_challenges {
        return 301 /coding-challenges/;
    }

    # ✅ Match all /coding-challenges/* requests and preserve slashes
    location /coding-challenges/ {
        proxy_pass http://coding_challenges:5001/coding-challenges/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # 🎮 Flashcard App
    location = /flashcards {
        return 301 /flashcards/;
    }

    location /flashcards/ {
        proxy_pass http://flashcard_generator:5005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /flashcards;
    }


    # 🔁 Fix for /report path — properly forward to reports container
    location = /report {
        return 301 /report/;
    }

    location /report/ {
        proxy_pass http://reports:5003/;
        rewrite ^/report/?(.*)$ /$1 break;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }
    # 🎮 Logic Gate Quiz
    location /logic-gate-quiz/ {
        proxy_pass http://logic_gate_quiz:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # Year 11 Revision page
    location = /year-11-revision {
        proxy_pass http://auth:5002/year-11-revision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }




    location ~ ^/(login|dashboard|logout)$ {
        proxy_pass http://auth:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }



    # 🌍 All other routes (must be logged in)
    location / {
        if ($http_cookie !~* "session=") {
            return 302 /login;
        }

        proxy_pass http://coding_challenges:5001;  # ✅ Correct container name
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

}
