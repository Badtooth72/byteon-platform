version: "3.8"
services:
  web:
    build: .
    container_name: flask_app
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:27017/coding_challenges
      - OPENAI_API_KEY=your_openai_api_key_here
    depends_on:
      - mongo
    expose:
      - "5001"
    networks:
      - app-network

  mongo:
    image: mongo:5
    container_name: mongo
    restart: always
    volumes:
      - ./mongo_data:/data/db
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs
    depends_on:
      - web
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

networks:
  app-network:

