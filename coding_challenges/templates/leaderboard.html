<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Leaderboard - Python GCSE Challenges</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f9f9f9;
    }
    .leaderboard-table {
      max-width: 900px;
      margin: auto;
    }
    .highlight {
      background-color: #d1e7dd !important;
    }
    .leaderboard-header {
      margin-top: 40px;
      margin-bottom: 20px;
    }
    .btn-back {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container leaderboard-table">
    <h1 class="text-center leaderboard-header">🏆 Leaderboard</h1>
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>Rank</th>
          <th>Display Name</th>
          <th>Level 1</th>
          <th>Level 2</th>
          <th>Level 3</th>
          <th>Total Score</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <!-- Leaderboard rows populated by JS -->
      </tbody>
    </table>
    <div class="text-center">
      <a href="/coding-challenges/" class="btn btn-primary btn-back">← Back to Home</a>
    </div>
  </div>

  <script>
    fetch('/coding-challenges/api/leaderboard')
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById("leaderboard-body");

        // Sort by total score descending
        data.sort((a, b) => b.total - a.total);

        // Cap to top 30
        const top30 = data.slice(0, 30);

        top30.forEach((user, index) => {
          const row = document.createElement("tr");
          if (user.is_self) row.classList.add("highlight");

          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${user.display_name}</td>
            <td>${user.level_scores["1"]}</td>
            <td>${user.level_scores["2"]}</td>
            <td>${user.level_scores["3"]}</td>
            <td><strong>${user.total}</strong></td>
          `;
          tbody.appendChild(row);
        });
      });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
