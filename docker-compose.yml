services:
  # Coding Challenges App (formerly 'web')
  coding_challenges:
    build: ./coding_challenges
    container_name: coding_challenges
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:27017/auth_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - mongo
    expose:
      - "5001"
    networks:
      - app-network
    labels:
      track_progress: "true"

  # MongoDB (shared database for all services)
  mongo:
    image: mongo:5
    container_name: mongo
    restart: always
    volumes:
      - ./mongo:/data/db
      - ./mongo_import:/data/import
    networks:
      - app-network

  # Authentication Service (LDAP + Mongo-backed profile)
  auth:
    build: ./auth
    container_name: auth_service
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:27017/auth_db
      - LDAP_SERVER=${LDAP_SERVER}
      - LDAP_PORT=636
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - SQL_SERVER=${SQL_SERVER}
      - SQL_DATABASE=${SQL_DATABASE}
      - SQL_USERNAME=${SQL_USERNAME}
      - SQL_PASSWORD=${SQL_PASSWORD}
    depends_on:
      - mongo
      - redis
    expose:
      - "5002"
    networks:
      - app-network
    labels:
      track_progress: "true"

  # Conversion Game App
  conversion_game:
    build: ./conversion_game
    container_name: conversion_game
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:27017/auth_db
      - JWT_SECRET=super-secret
    depends_on:
      - mongo
    networks:
      - app-network
    expose:
      - "5003"
    
 
  #Logic Gate App
  logic_gate_quiz:
    build: ./logic_gate_quiz
    container_name: logic_gate_quiz
    restart: always
    expose:
      - "80"
    networks:
      - app-network

  #Flashcard App
  flashcard_generator:
    build: ./flashcard_generator
    container_name: flashcard_generator
    restart: always
    environment:
      - AUTH_API_BASE=http://auth:5002
      - MONGO_URI=mongodb://mongo:27017/auth_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_SECRET=super-secret
      - URL_PREFIX=/flashcards
      - SUPER_ADMIN_USERNAMES=agriffiths
    depends_on:
      - mongo
      - redis
    expose:
      - "5005"
    networks:
      - app-network
    labels:
      track_progress: "true"



  # Reports App
  reports:
    build: ./reports
    container_name: reports_service
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:27017/auth_db
    depends_on:
      - mongo
    expose:
      - "5003"
    networks:
      - app-network

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - coding_challenges
      - auth
      - conversion_game
    networks:
      - app-network

  # Certbot for Let's Encrypt SSL
  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "while :; do certbot renew; sleep 12h & wait $${!}; done;"
    networks:
      - app-network

  # Redis for session handling
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
