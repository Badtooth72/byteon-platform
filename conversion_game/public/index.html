<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conversion Game</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Custom Styling -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="/conversion-game/favicon.ico" type="image/x-icon">

</head>
<body>

<div class="container text-center">
  <h1 class="mb-4">🧠 Number Conversion Game</h1>

  <!-- SETUP SECTION -->
  <div id="personal-best" class="alert alert-dark border-light d-none">
    <strong>🏆 Personal Best</strong><br/>
    <span id="best-details">Loading...</span>
  </div> 
  <div id="setup-section">
    <div id="personal-best" class="alert alert-dark border-light d-none">
      <strong>🏆 Personal Best</strong><br/>
      <span id="best-details">Loading...</span>
    </div>

    <label for="mode">Choose difficulty:</label>
    <select id="mode" class="form-select mb-2">
      <option value="easy">Easy (10 questions)</option>
      <option value="medium">Medium (20 questions)</option>
      <option value="hard">Hard (20 questions)</option>
      <option value="custom">Custom</option>
    </select>

    <div id="custom-options" style="display:none;" class="mb-3">
      <label>Conversions:</label>
      <div class="form-check text-start">
        <input class="form-check-input" type="checkbox" value="bin-to-dec" id="c1">
        <label class="form-check-label" for="c1">Binary to Decimal</label><br/>
        <input class="form-check-input" type="checkbox" value="dec-to-bin" id="c2">
        <label class="form-check-label" for="c2">Decimal to Binary</label><br/>
        <input class="form-check-input" type="checkbox" value="hex-to-bin" id="c3">
        <label class="form-check-label" for="c3">Hex to Binary</label><br/>
        <input class="form-check-input" type="checkbox" value="bin-to-hex" id="c4">
        <label class="form-check-label" for="c4">Binary to Hex</label><br/>
        <input class="form-check-input" type="checkbox" value="dec-to-hex" id="c5">
        <label class="form-check-label" for="c5">Decimal to Hex</label><br/>
        <input class="form-check-input" type="checkbox" value="hex-to-dec" id="c6">
        <label class="form-check-label" for="c6">Hex to Decimal</label>
      </div>

      <label class="mt-2">Number of questions:</label>
      <input type="number" id="custom-count" class="form-control" min="1" max="30" value="10" />
    </div>

    <div class="form-check text-start mt-2">
      <input class="form-check-input" type="checkbox" id="timer-toggle" checked>
      <label class="form-check-label" for="timer-toggle">Enable Timer</label>
    </div>

    <button class="btn btn-primary mt-3" onclick="startGame()">Start Game</button>
    <button class="btn btn-warning mt-3" onclick="window.location.href='/dashboard'">📋 Dashboard</button>
    <a href="/conversion-game/conversion_game_leaderboard.html?username=agriffiths" class="btn btn-outline-info mt-3">
      🏆 View Leaderboard
    </a>
    




  </div>

  <!-- GAME SECTION -->
  <div id="game-section" style="display:none;" class="mt-4">
    <div class="d-flex justify-content-center align-items-start gap-4 flex-wrap">
      <div class="flex-grow-1">
        <div id="question-box" class="question-box mb-3"></div>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-2 justify-content-center">
          <input type="text" id="answer-input" class="form-control" placeholder="Type your answer..." />
          <button class="btn btn-success" onclick="submitAnswer()">Submit</button>
        </div>
        <div id="feedback-squares" class="d-flex flex-wrap gap-1 justify-content-center mt-2"></div>
      </div>
      <div id="timer-box" class="fs-3 text-info d-none">⏱️ <span id="timer">0s</span></div>
    </div>

    <!-- BINARY HELPER -->
    <div id="binary-table" class="mt-3" style="display:none;">
      <table class="table table-dark text-center">
        <thead>
          <tr><th>128</th><th>64</th><th>32</th><th>16</th><th>8</th><th>4</th><th>2</th><th>1</th></tr>
        </thead>
        <tbody>
          <tr id="binary-buttons"></tr>
        </tbody>
      </table>
      <div class="text-center mt-2">
        <button class="btn btn-sm btn-success" onclick="insertBinary()">Add to Answer</button>
      </div>
      <div id="decimal-output" class="mt-2 text-info fs-5">Decimal Value: 0</div>
    </div>

    <div class="text-center mt-3">
      <button class="btn btn-warning mt-3" onclick="window.location.href='/dashboard'">📋 Dashboard</button>
      <button class="btn btn-info mt-3" onclick="window.location.href='/conversion-game'">🏠 Game Home</button>
     


    

    </div>
  </div>

  <!-- RESULT SECTION -->
  <div id="result-box" style="display:none;" class="text-center mt-4">
    <h3>🎉 Game Over!</h3>
    <p id="final-score"></p>
    <p id="timing-summary"></p>
    <div class="d-flex justify-content-center gap-2 flex-wrap">
      <button class="btn btn-primary" onclick="showReviewModal()">Review Answers</button>
      <button class="btn btn-secondary" onclick="window.location.reload()">Play Again</button>
      <button class="btn btn-warning" onclick="window.location.href='/dashboard'">Go to Dashboard</button>
    </div>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal fade" id="reviewSummaryModal" tabindex="-1" aria-labelledby="reviewSummaryModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable modal-lg">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title">📝 Quiz Review</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="review-modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- SCRIPT SECTION -->
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ✅ Ensure custom options toggle works
  document.addEventListener("DOMContentLoaded", () => {
    const modeSelect = document.getElementById("mode");
    const customOptions = document.getElementById("custom-options");

    function toggleCustomOptions() {
      customOptions.style.display = modeSelect.value === "custom" ? "block" : "none";
    }

    modeSelect.addEventListener("change", toggleCustomOptions);
    toggleCustomOptions(); // run once on load
  });
</script>
</body>
</html>
