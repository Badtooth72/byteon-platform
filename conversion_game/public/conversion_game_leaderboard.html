<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🏆 Conversion Game Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background-color: #222; color: #fff; }
    th.sticky { position: sticky; top: 0; background-color: #333; cursor: pointer; z-index: 2; }
    th.sorted-asc::after { content: " 🔼"; }
    th.sorted-desc::after { content: " 🔽"; }
    .highlight-user td { background-color: #007f5f !important; color: #fff !important; }
  </style>
</head>
<body>
<div class="container mt-4">
  <h2 class="text-center mb-4">🏆 Conversion Game Leaderboard</h2>

  <div class="text-center mb-3">
    <a href="/conversion-game" class="btn btn-outline-light me-2">🏠 Back to Game</a>
    <a href="/dashboard" class="btn btn-outline-info">📋 Dashboard</a>
  </div>

  <div class="table-responsive">
    <table class="table table-dark table-hover" id="leaderboard-table">
      <thead>
        <tr>
          <th class="sticky" onclick="sortTable(0)">Name</th>
          <th class="sticky" onclick="sortTable(1)">Class</th>
          <th class="sticky" onclick="sortTable(2)">Year</th>
          <th class="sticky" onclick="sortTable(3)">Mode</th>
          <th class="sticky" onclick="sortTable(4)">Score</th>
          <th class="sticky" onclick="sortTable(5)">Fastest (s)</th>
          <th class="sticky" onclick="sortTable(6)">Total Time (s)</th>
          <th class="sticky" onclick="sortTable(7)">Date</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </div>
</div>

<script>
  let currentSortCol = 4, currentSortDir = "desc";
  let currentUser = "";

  fetch("/auth/api/session-user")
    .then(r => r.json())
    .then(user => {
      currentUser = user.username;
      loadLeaderboard();
    });

  function loadLeaderboard() {
    fetch("/auth/api/conversion_game/leaderboard")
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById("leaderboard-body");
        data.forEach(entry => {
          const row = document.createElement("tr");

          // Add a data attribute so we can compare later
          row.setAttribute("data-username", entry.username);

          if (entry.username === currentUser) {
            row.classList.add("highlight-user");
          }

          const date = new Date(entry.date);
          row.innerHTML = `
            <td>${entry.forename || "—"} ${entry.surname || ""}</td>
            <td>${entry.class_name || "—"}</td>
            <td>${entry.yeargroup || "—"}</td>
            <td>${entry.mode}</td>
            <td>${entry.score}</td>
            <td>${entry.fastest_time}</td>
            <td>${entry.total_time}</td>
            <td>${isNaN(date) ? "—" : date.toLocaleDateString("en-GB")}</td>
          `;
          tbody.appendChild(row);
        });
        sortTable(currentSortCol);
      });
  }

  function sortTable(colIndex) {
    const table = document.getElementById("leaderboard-table");
    const rows = Array.from(table.querySelectorAll("tbody tr"));
    const isNumeric = !isNaN(rows[0].cells[colIndex].innerText);

    if (currentSortCol === colIndex) {
      currentSortDir = currentSortDir === "asc" ? "desc" : "asc";
    } else {
      currentSortCol = colIndex;
      currentSortDir = "desc";
    }

    rows.sort((a, b) => {
      const valA = a.cells[colIndex].innerText;
      const valB = b.cells[colIndex].innerText;
      return isNumeric
        ? (currentSortDir === "asc" ? valA - valB : valB - valA)
        : (currentSortDir === "asc" ? valA.localeCompare(valB) : valB.localeCompare(valA));
    });

    const tbody = table.querySelector("tbody");
    tbody.innerHTML = "";
    rows.forEach(row => tbody.appendChild(row));

    document.querySelectorAll("th").forEach(th => th.classList.remove("sorted-asc", "sorted-desc"));
    table.querySelectorAll("th")[colIndex].classList.add(currentSortDir === "asc" ? "sorted-asc" : "sorted-desc");
  }
</script>
</body>
</html>
